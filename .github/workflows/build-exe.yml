name: Build Executable

on:
  push:
    branches:
      - main
    tags:
      - 'v*'
  pull_request:
    branches:
      - main
  workflow_dispatch:
    inputs:
      platform:
        description: 'Target platform'
        required: true
        default: 'x64'
        type: choice
        options:
          - x64
          - arm64
          - all

run-name: "Build FluentHub.exe (${{ github.event.inputs.platform || 'all' }})"

env:
  APP_PROJECT_PATH:  '${{ github.workspace }}/src/FluentHub.App/FluentHub.App.csproj'
  APP_CREDENTIALS:   '${{ github.workspace }}/src/FluentHub.App/AppCredentials.config'
  PUBLISH_DIR:       '${{ github.workspace }}/publish'

jobs:
  build:
    runs-on: windows-2022
    strategy:
      fail-fast: false
      matrix:
        platform: [x64, arm64]
        exclude:
          - platform: ${{ (github.event.inputs.platform != 'all' && github.event.inputs.platform != '') && github.event.inputs.platform || 'NEEDLE' }}

    steps:
    - name: Checkout the repository
      uses: actions/checkout@v4

    - name: Setup .NET
      uses: actions/setup-dotnet@v4
      with:
        dotnet-version: '10.0.x'

    - name: Write AppCredentials.config
      shell: pwsh
      run: |
        $clientId = "${{ secrets.OAUTH_CLIENT_ID }}"
        $clientSecret = "${{ secrets.OAUTH_CLIENT_SECRET }}"
        if ([string]::IsNullOrEmpty($clientId)) {
          Write-Error "OAUTH_CLIENT_ID secret is not set."
          exit 1
        }
        $xml = "<root><client><type key=""id"" value=""$clientId"" /><type key=""secret"" value=""$clientSecret"" /></client></root>"
        [IO.File]::WriteAllText("${{ env.APP_CREDENTIALS }}", $xml)
        Write-Host "AppCredentials.config written."

    - name: Restore dependencies
      run: dotnet restore ${{ env.APP_PROJECT_PATH }} -r win-${{ matrix.platform }}

    - name: Publish FluentHub
      shell: pwsh
      run: |
        dotnet publish "${{ env.APP_PROJECT_PATH }}" `
          -r "win-${{ matrix.platform }}" `
          -c Release `
          --self-contained true `
          -p:WindowsPackageType=None `
          -p:GenerateAppxPackageOnBuild=false `
          -p:EnableMsixTooling=false `
          -p:AppxBundle=Never `
          -p:PublishSingleFile=true `
          -p:WindowsAppSDKSelfContained=true `
          -p:IncludeNativeLibrariesForSelfExtract=true `
          -p:EnableCompressionInSingleFile=true `
          -p:PublishAot=false `
          -o "${{ env.PUBLISH_DIR }}/${{ matrix.platform }}"

    - name: Create portable zip
      shell: pwsh
      run: |
        $zipName = "FluentHub-${{ matrix.platform }}.zip"
        Compress-Archive -Path "${{ env.PUBLISH_DIR }}/${{ matrix.platform }}/*" -DestinationPath "${{ env.PUBLISH_DIR }}/$zipName"
        $size = [math]::Round((Get-Item "${{ env.PUBLISH_DIR }}/$zipName").Length / 1MB, 2)
        Write-Host "Created: $zipName ($size MB)"

    - name: Upload artifact
      uses: actions/upload-artifact@v4
      with:
        name: FluentHub-${{ matrix.platform }}
        path: ${{ env.PUBLISH_DIR }}/FluentHub-${{ matrix.platform }}.zip

  release:
    needs: build
    runs-on: ubuntu-latest
    if: startsWith(github.ref, 'refs/tags/v')
    permissions:
      contents: write

    steps:
    - name: Download all artifacts
      uses: actions/download-artifact@v4
      with:
        path: artifacts

    - name: Create GitHub Release
      uses: softprops/action-gh-release@v2
      with:
        generate_release_notes: true
        files: |
          artifacts/FluentHub-x64.zip
          artifacts/FluentHub-arm64.zip
